<!DOCTYPE html>
<html lang="en">

<head>
    <meta charSet="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <style>
        :root {
            --navBarColor: #2d2d2d;
            --backgroundColor: #151515;
            --navBarLightColor: #595959;
            --textInButtonPadding: 1.2rem;
            --textColor: #32c848;
            --textHoverColor: #fc625c;
        }

        html {
            box-sizing: border-box;
            font-size: 12px
        }

        *,
        :after,
        :before {
            box-sizing: inherit
        }

        body {
            font-family: Roboto Mono, monospace;
            margin: 0;
            background-color: var(--backgroundColor);
            color: #fff;
            
        }

        a {
            color: var(--textColor);
            text-decoration: none
        }

        a:hover {
            color: var(--textHoverColor);
        }

        header, footer {
            margin:1rem 0;
        }
        .navBar {
            padding: var(--textInButtonPadding);
            background-color: var(--navBarColor);
            border-radius: 2px;
        }
        .page {
            margin:0 auto;
            max-width:960px;
        }
        .content {
            margin: 0.2rem
        }
        footer {
            padding:1.45rem 1.0875rem;
            position: absolute;
            bottom: 0;
        }
    </style>
    <title>Home | deuh.github.io</title>
    <meta name="description" content="Deuh&#x27;s lab." />
    <meta property="og:title" content="Home" />
    <meta property="og:description" content="Deuh&#x27;s lab." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:creator" content="@deuh" />
    <meta name="twitter:title" content="Home" />
    <meta name="twitter:description" content="Deuh&#x27;s lab." />
</head>

<body>
    <div class="page">
        <header>
            <div class="navBar">
                <a aria-current="page" class="" href="/">deuh.github.io</a> &gt; 🧪 Labs</div>
        </header>
        <div class="content">
            <a href="/">[🔒] - [ Experiment #1: Spices ]</a><br />
            <a href="/">[🔒] - [ Experiment #2: Timeline ]</a>
        </div>
        <footer>
            [ <a aria-current="page" class="" href="/">deuh.github.io</a> &gt; 🧪 Labs ]
        </footer>
    </div>
</body>
</html>
